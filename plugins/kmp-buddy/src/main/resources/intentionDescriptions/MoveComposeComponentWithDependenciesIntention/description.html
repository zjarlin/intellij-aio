<p><strong>MoveComposeComponentWithDependenciesIntention</strong></p>
<p>Moves the current top-level Compose component file together with same-package Kotlin files it references.</p>
<p>Use it when a reusable component depends on local visual tokens, models, helpers, or other small declarations that should move with it.</p>
